<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PhishLens</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0f1923;
            --bg-secondary: #162130;
            --bg-card: #1a2a3a;
            --bg-hover: #1e3248;
            --border: #2a3f55;
            --text-primary: #e8edf2;
            --text-secondary: #8899aa;
            --text-muted: #5a6f82;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --accent-glow: rgba(59, 130, 246, 0.15);
            --danger: #ef4444;
            --success: #22c55e;
            --warning: #f59e0b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'IBM Plex Sans', -apple-system, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .navbar {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            padding: 0 24px;
            height: 52px;
            display: flex;
            align-items: center;
        }

        .logo {
            font-size: 18px;
            font-weight: 700;
            color: var(--text-primary);
            letter-spacing: -0.5px;
        }

        .logo span {
            color: var(--accent);
        }

        .main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
        }

        .upload-container {
            text-align: center;
            max-width: 560px;
            width: 100%;
        }

        .upload-title {
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        .upload-subtitle {
            color: var(--text-secondary);
            font-size: 15px;
            margin-bottom: 40px;
        }

        .dropzone {
            border: 2px dashed var(--border);
            border-radius: 12px;
            padding: 60px 40px;
            background: var(--bg-secondary);
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .dropzone:hover, .dropzone.dragover {
            border-color: var(--accent);
            background: var(--accent-glow);
        }

        .dropzone-icon {
            width: 56px;
            height: 56px;
            margin: 0 auto 20px;
            background: var(--bg-card);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .dropzone-icon svg {
            width: 28px;
            height: 28px;
            stroke: var(--accent);
        }

        .dropzone-text {
            font-size: 16px;
            font-weight: 500;
            margin-bottom: 6px;
        }

        .dropzone-text span {
            color: var(--accent);
            text-decoration: underline;
            text-underline-offset: 2px;
        }

        .dropzone-hint {
            font-size: 13px;
            color: var(--text-muted);
        }

        .file-input {
            display: none;
        }

        .loading {
            display: none;
            margin-top: 32px;
        }

        .loading.active { display: block; }

        .loading-bar {
            height: 3px;
            background: var(--bg-card);
            border-radius: 2px;
            overflow: hidden;
            margin-bottom: 12px;
        }

        .loading-bar-fill {
            height: 100%;
            background: var(--accent);
            border-radius: 2px;
            width: 0%;
            animation: loading 2s ease-in-out infinite;
        }

        @keyframes loading {
            0% { width: 0%; margin-left: 0%; }
            50% { width: 60%; margin-left: 20%; }
            100% { width: 0%; margin-left: 100%; }
        }

        .loading-text {
            font-size: 14px;
            color: var(--text-secondary);
        }

        .error {
            display: none;
            margin-top: 20px;
            padding: 12px 16px;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: 8px;
            color: var(--danger);
            font-size: 14px;
        }

        .error.active { display: block; }

        .recent-uploads {
            margin-top: 48px;
            text-align: left;
        }

        .recent-title {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 12px;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo">Phish<span>Lens</span></div>
    </nav>

    <main class="main">
        <div class="upload-container">
            <h1 class="upload-title">Analyze Email</h1>
            <p class="upload-subtitle">Upload a suspicious email file for forensic analysis</p>

            <div class="dropzone" id="dropzone">
                <div class="dropzone-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5m-13.5-9L12 3m0 0l4.5 4.5M12 3v13.5" />
                    </svg>
                </div>
                <p class="dropzone-text">Drop .eml file here or <span>browse</span></p>
                <p class="dropzone-hint">Supports .eml, .msg, .txt formats — Max 25MB</p>
                <input type="file" class="file-input" id="fileInput" accept=".eml,.msg,.txt">
            </div>

            <div class="loading" id="loading">
                <div class="loading-bar"><div class="loading-bar-fill"></div></div>
                <p class="loading-text">Parsing email headers and extracting indicators...</p>
            </div>

            <div class="error" id="error"></div>
        </div>
    </main>

    <script>
        const dropzone = document.getElementById('dropzone');
        const fileInput = document.getElementById('fileInput');
        const loading = document.getElementById('loading');
        const errorDiv = document.getElementById('error');

        dropzone.addEventListener('click', () => fileInput.click());

        dropzone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropzone.classList.add('dragover');
        });

        dropzone.addEventListener('dragleave', () => {
            dropzone.classList.remove('dragover');
        });

        dropzone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropzone.classList.remove('dragover');
            const files = e.dataTransfer.files;
            if (files.length > 0) uploadFile(files[0]);
        });

        fileInput.addEventListener('change', () => {
            if (fileInput.files.length > 0) uploadFile(fileInput.files[0]);
        });

        function uploadFile(file) {
            errorDiv.classList.remove('active');
            loading.classList.add('active');

            const formData = new FormData();
            formData.append('file', file);

            fetch('/upload', {
                method: 'POST',
                body: formData
            })
            .then(res => res.json())
            .then(data => {
                if (data.error) {
                    loading.classList.remove('active');
                    errorDiv.textContent = data.error;
                    errorDiv.classList.add('active');
                } else if (data.redirect) {
                    window.location.href = data.redirect;
                }
            })
            .catch(err => {
                loading.classList.remove('active');
                errorDiv.textContent = 'Upload failed. Please try again.';
                errorDiv.classList.add('active');
            });
        }
    </script>
</body>
</html>
